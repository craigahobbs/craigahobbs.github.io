<!DOCTYPE html>
<html lang="en">
    <head>
        <title>craigahobbs.github.io</title>
        <meta charset="UTF-8">
        <meta name="description" content="The root GitHub page of Craig A. Hobbs">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://craigahobbs.github.io/markdown-up/app.css">
        <link rel="preload" href="https://craigahobbs.github.io/markdown-up/bare-script/static/markdown.css" as="style">
        <link rel="modulepreload" href="https://craigahobbs.github.io/markdown-up/lib/appImports.js" as="script">
    </head>
    <script type="module">
        import {MarkdownUp} from 'https://craigahobbs.github.io/markdown-up/lib/appImports.js';
        const app = new MarkdownUp(window, {
            'markdownText': `\
~~~ markdown-script
include <pager.bare>

pagerMain( \\
    {'pages': [ \\
        {'name': 'Home', 'type': {'markdown': {'url': 'README.md'}}}, \\
        {'name': 'MarkdownUp', 'type': {'markdown': {'url': 'MarkdownUpApplications.md'}}}, \\
        {'name': 'GitHub', 'type': {'link': {'url': 'https://github.com/craigahobbs'}}} \\
    ]}, \\
    {'hideNav': true} \\
)
~~~
`
        });
        app.run();
    </script>
</html>
